<!-- Experience Section (The Layering Principle) -->
<section class="bg-surface-container-low py-26 px-6" id="experience">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-4">
      <div>
        <span class="text-primary font-bold tracking-widest text-xs uppercase mb-2 block">Trayectoria Profesional</span>
        <h2 class="text-4xl font-bold tracking-tight text-on-surface">Experiencia Profesional</h2>
      </div>
      <div class="h-0.5 grow mx-8 bg-outline-variant/20 hidden md:block mb-4"></div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
      @for(exp of experiencia(); track $index){
      <app-card-experience-component [experiencia]="exp" />
      }
    </div>
  </div>
</section>
