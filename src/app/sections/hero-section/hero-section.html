<section class="min-h-217.5 flex flex-col md:flex-row items-center justify-center px-6 max-w-7xl mx-auto gap-12 py-20">
  <div class="w-full md:w-1/2 space-y-6">
    <div
      class="inline-block px-4 py-1.5 bg-secondary-container text-on-secondary-container rounded-full text-xs font-bold tracking-widest uppercase">
      Ingeniero en Sistemas Computacionales</div>
    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter text-on-surface leading-tight">
      {{ about().nombreCompleto}}
    </h1>
    <p class="text-xl text-on-surface-variant max-w-md font-medium leading-relaxed">
      {{ about().descripcion}}
    </p>
    <div class="flex flex-wrap gap-4 pt-4">
      <div class="flex items-center gap-2 text-on-surface-variant">
        <i class="pi pi-envelope text-primary"></i>
        <span class="text-sm font-medium">{{ about().email }}</span>
      </div>
      <div class="flex items-center gap-2 text-on-surface-variant">
        <i class="pi pi-map-marker text-primary"></i>
        <span class="text-sm font-medium">{{ about().ubicacion }}</span>
      </div>
      <div class="flex items-center gap-2 text-on-surface-variant">
        <i class="pi pi-calendar text-primary"></i>
        <span class="text-sm font-medium">{{ about().edad }} años</span>
      </div>
    </div>
    <div class="pt-6">
      <a href="{{ about().cv }}" target="_blank"
        class="bg-primary hover:bg-primary-dim text-white px-8 py-4 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-primary/20 w-fit">
        Ver CV
        <i class="pi pi-arrow-right"></i>
      </a>
    </div>
  </div>
  <div class="w-full md:w-1/2 relative">
    <div class="aspect-square rounded-3xl overflow-hidden bg-surface-container-high relative z-10">
      <img alt="Foto de Aldo Guevara Muñoz" class="w-full h-full object-cover" [src]="about().foto " />
    </div>
    <div class="absolute -bottom-6 -left-6 w-32 h-32 bg-tertiary-container rounded-2xl -z-10"></div>
    <div class="absolute -top-6 -right-6 w-48 h-48 bg-primary-container/30 rounded-full blur-3xl -z-10"></div>
  </div>
</section>
