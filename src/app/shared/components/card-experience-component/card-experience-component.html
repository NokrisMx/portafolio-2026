<div
  class="h-full bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-sm hover:shadow-xl transition-shadow flex flex-col justify-between">
  <div>
    <div class="flex justify-between items-start mb-6">
      <div class="bg-primary/10 p-1 rounded-lg">
        <img [src]="experiencia().logo" alt="{{ experiencia().empresa }}" class="w-9 h-9 object-contain" />
      </div>
      <span
        class="text-xs font-bold text-on-surface-variant bg-surface-container-high px-3 py-1 rounded-full uppercase tracking-tighter">{{
        experiencia().fechaInicio }} - {{ experiencia().fechaFin }}</span>
    </div>
    <h3 class="text-2xl font-bold text-on-surface mb-1">{{ experiencia().puesto }}</h3>
    <a href="{{ experiencia().url }}" target="_blank" class="text-primary font-semibold mb-4">{{ experiencia().empresa
      }}</a>
    <p class="text-on-surface-variant leading-relaxed">{{ experiencia().descripcion }}</p>
  </div>
  <div class="mt-8 pt-8 border-t border-surface-container flex flex-wrap gap-2">
    @for(habilidad of experiencia().habilidades; track $index){
    <span
      class="px-3 py-1 bg-surface-container-high text-on-surface-variant rounded-full text-[10px] font-bold uppercase tracking-wider">
      {{ habilidad }}</span>
    }
  </div>
</div>
